name: Build Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: |
          cd mod-ci
          gradle build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-command-confirm-jar
          path: mod-ci/build/libs/no-command-confirm-*.jar
          if-no-files-found: error
